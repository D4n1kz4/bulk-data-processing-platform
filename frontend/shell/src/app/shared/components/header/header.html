<header class="h-16 bg-slate-900 text-white flex items-center justify-between px-6 shadow">
  <div>
    <h1 class="text-lg font-semibold">Bulk Data Processing Platform</h1>
    <p class="text-xs text-slate-300">Angular Shell</p>
  </div>

  <div class="text-sm text-slate-300">
    Backend API: Spring Boot
  </div>

  <button
    type="button"
    (click)="openLogoutModal()"
    class="bg-white/10 hover:bg-white/20 text-white px-4 py-2 rounded-lg text-sm transition"
  >
    Logout
  </button>

</header>


@if (showLogoutModal) {
  <app-confirm-modal
    title="Confirm logout"
    message="Are you sure you want to close your session?"
    confirmText="Logout"
    cancelText="Cancel"
    (confirm)="confirmLogout()"
    (cancel)="cancelLogout()"
  />
}
